name: Security Audit

on:
  schedule:
    - cron: "17 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustsec:
    name: RustSec advisory audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.85.0
      - name: Install cargo-audit 0.22.1
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Check Rust advisories
        run: cargo audit --deny warnings
      - name: Check fuzz dependency advisories
        working-directory: fuzz
        run: cargo audit --deny warnings
