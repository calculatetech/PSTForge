name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu 24.04 CI
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          submodules: recursive
      - name: Validate GitHub Actions workflows
        run: |
          curl --fail --location --silent --show-error \
            --output actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file actionlint.tar.gz actionlint
          ./actionlint -color
      - name: Install native tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            autoconf automake autopoint build-essential libtool pkg-config \
            pff-tools pst-utils zlib1g-dev
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Install cargo-audit 0.22.1
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Check Rust advisories
        run: cargo audit --deny warnings
      - name: Run public CI gate
        run: cargo xtask gate ci
      - name: Show bounded public gate failure
        if: failure()
        run: find .agent/test-results \( -name tests.log -o -name diff-check.log \) -exec tail --lines=250 {} \;

  debian:
    name: Debian 13 package
    runs-on: ubuntu-24.04
    container: debian:13-slim
    timeout-minutes: 60
    steps:
      - name: Install host tools
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends \
            autoconf automake autopoint binutils build-essential ca-certificates curl \
            dpkg-dev findutils git gzip libtool lintian pkg-config \
            pff-tools pst-utils zlib1g-dev
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Run public CI gate
        run: cargo xtask gate ci
      - name: Show bounded public gate failure
        if: failure()
        run: find .agent/test-results \( -name tests.log -o -name diff-check.log \) -exec tail --lines=250 {} \;
      - name: Build and validate Debian package
        run: cargo xtask package deb --validate
