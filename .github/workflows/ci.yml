name: CI

on:
  push:
    branches:
      - main
      - "milestone/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu:
    name: Ubuntu 24.04 CI
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Validate GitHub Actions workflows
        run: |
          curl --fail --location --silent --show-error \
            --output actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file actionlint.tar.gz actionlint
          ./actionlint -color
      - name: Install native tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes libpff-dev pff-tools pst-utils pkg-config
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Check Rust advisories
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run public CI gate
        run: cargo xtask gate ci

  debian:
    name: Debian 13 package
    runs-on: ubuntu-24.04
    container: debian:13-slim
    timeout-minutes: 60
    steps:
      - name: Install host tools
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends \
            binutils build-essential ca-certificates curl dpkg-dev findutils git gzip \
            libpff-dev lintian pkg-config pff-tools pst-utils
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - name: Run public CI gate
        run: cargo xtask gate ci
      - name: Build and validate Debian package
        run: cargo xtask package deb
