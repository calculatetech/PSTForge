name: Private PST Corpus

on:
  workflow_dispatch:
    inputs:
      tier:
        description: Local gate tier
        required: true
        default: full
        type: choice
        options:
          - full
          - release

permissions:
  contents: read

concurrency:
  group: private-pst-corpus
  cancel-in-progress: false

jobs:
  corpus:
    name: Redacted private corpus gate
    if: github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - linux
      - x64
      - pstforge-private-corpus
    timeout-minutes: 1440
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - name: Verify private manifest configuration
        env:
          PSTFORGE_CORPUS_MANIFEST: ${{ secrets.PSTFORGE_CORPUS_MANIFEST }}
        run: |
          test -n "$PSTFORGE_CORPUS_MANIFEST"
          test -r "$PSTFORGE_CORPUS_MANIFEST"
      - name: Run redacted private gate
        id: gate
        env:
          PSTFORGE_CORPUS_MANIFEST: ${{ secrets.PSTFORGE_CORPUS_MANIFEST }}
        run: |
          mkdir --parents .agent/test-results
          cargo xtask gate "${{ inputs.tier }}" \
            > .agent/test-results/github-private-console.log 2>&1
      - name: Write bounded job summary
        if: always()
        env:
          RESULT: ${{ steps.gate.outcome }}
          TIER: ${{ inputs.tier }}
        run: |
          {
            echo "## Private corpus gate"
            echo
            echo "- Tier: \`$TIER\`"
            echo "- Result: \`$RESULT\`"
            echo "- PSTs, job state, reader output, and detailed logs were not uploaded."
          } >> "$GITHUB_STEP_SUMMARY"
